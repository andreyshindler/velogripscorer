name: Android APK

# Builds the debug APK and delivers it to Telegram. Runs only when the Android
# app changes (or on a manual dispatch), so web-only pushes don't rebuild it.
on:
  push:
    branches: ['**']
    paths:
      - 'android/**'
      - '.github/workflows/android.yml'
  pull_request:
    paths:
      - 'android/**'
      - '.github/workflows/android.yml'
  workflow_dispatch:

jobs:
  build:
    name: Build debug APK
    runs-on: ubuntu-latest
    env:
      TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
      TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.9'
      - name: Build debug APK
        working-directory: android
        run: gradle assembleDebug --no-daemon
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: velogrip-rfid-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
      - name: Send APK to Telegram
        # Skip on pull requests; only send when the bot secret is configured.
        if: github.event_name != 'pull_request' && env.TG_BOT_TOKEN != ''
        working-directory: android
        env:
          COMMIT_MSG: ${{ github.event.head_commit.message }}
        run: |
          set -euo pipefail
          SHORT="${GITHUB_SHA::7}"
          OUT="velogrip-${SHORT}.apk"
          cp app/build/outputs/apk/debug/app-debug.apk "$OUT"
          # First line of the commit message, bounded for Telegram's caption limit.
          SUBJECT=$(printf '%s' "${COMMIT_MSG:-}" | head -n1 | cut -c1-200)
          CAPTION="✅ VeloGrip APK — ${GITHUB_REF_NAME} @ ${SHORT}
          ${SUBJECT}"
          curl -sS -f \
            -F chat_id="${TG_CHAT_ID}" \
            -F document=@"${OUT}" \
            -F caption="${CAPTION}" \
            "https://api.telegram.org/bot${TG_BOT_TOKEN}/sendDocument" > /dev/null
          echo "APK sent to Telegram chat ${TG_CHAT_ID}."
