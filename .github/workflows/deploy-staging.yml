name: Deploy to Staging

# Preview slot: push web/server/Docker changes to the `staging` branch and this
# job (on the same self-hosted VPS runner) redeploys a SEPARATE stack — its own
# clone, its own DB volume, its own port/URL — so you can click through changes
# before merging to main/prod. Never touches the prod stack.
on:
  push:
    branches: [staging]
    paths:
      - 'server/**'
      - 'public/**'
      - 'package.json'
      - 'package-lock.json'
      - 'openapi.yaml'
      - 'Dockerfile'
      - 'docker-compose.yml'
      - 'Caddyfile'
      - '.github/workflows/deploy-staging.yml'
  workflow_dispatch:

concurrency:
  group: deploy-staging
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: self-hosted
    env:
      TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
      TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
    steps:
      - name: Pull staging and rebuild the staging stack
        id: deploy
        env:
          # Separate clone from prod. Override via repo Variables if elsewhere.
          STAGING_DEPLOY_DIR: ${{ vars.STAGING_DEPLOY_DIR }}
          DEPLOY_DIR: ${{ vars.DEPLOY_DIR }}
        run: |
          set -euo pipefail
          STAGING_DIR="${STAGING_DEPLOY_DIR:-$HOME/projects/velogripscorer-staging}"
          PROD_DIR="${DEPLOY_DIR:-$HOME/projects/velogripscorer}"

          # First run: bootstrap the staging clone from the prod clone (local
          # clone reuses prod's origin credentials, so private repos work) and
          # seed .env from prod's — same secrets, but its own port, its own
          # path prefix, and NO Telegram bot (two pollers on one token clash).
          if [ ! -d "$STAGING_DIR/.git" ]; then
            echo "Bootstrapping staging clone in $STAGING_DIR"
            git clone "$PROD_DIR" "$STAGING_DIR"
            git -C "$STAGING_DIR" remote set-url origin "$(git -C "$PROD_DIR" remote get-url origin)"
            if [ -f "$PROD_DIR/.env" ]; then
              grep -vE '^(HOST_PORT|BASE_PATH|TELEGRAM_BOT_TOKEN|TELEGRAM_ALLOWED_USER_IDS|DOMAIN)=' "$PROD_DIR/.env" > "$STAGING_DIR/.env"
            fi
            {
              echo "HOST_PORT=3001"
              echo "BASE_PATH=/veloscorer-staging"
              echo "TELEGRAM_BOT_TOKEN="
              echo "TELEGRAM_ALLOWED_USER_IDS="
            } >> "$STAGING_DIR/.env"
          fi

          cd "$STAGING_DIR"
          echo "Deploying staging in $(pwd)"
          git fetch origin staging
          git reset --hard origin/staging
          docker compose -p velogrip-staging up -d --build app
          docker image prune -f
          docker compose -p velogrip-staging ps

          # Smoke check + environment survey (guides how to expose staging).
          sleep 3
          curl -fsS "http://127.0.0.1:3001/veloscorer-staging/api/health" && echo " <- staging app healthy"
          echo "--- listeners on 80/443/3000/3001 ---"
          (command -v ss >/dev/null && ss -ltn | grep -E ':(80|443|3000|3001)\s' || true)
          echo "--- running containers ---"
          docker ps --format '{{.Names}}\t{{.Ports}}'
          echo "--- host web servers ---"
          (systemctl is-active nginx 2>/dev/null || true); (systemctl is-active apache2 2>/dev/null || true)

      - name: Notify Telegram
        if: always() && env.TG_BOT_TOKEN != ''
        env:
          STATUS: ${{ steps.deploy.outcome }}
          COMMIT_MSG: ${{ github.event.head_commit.message }}
        run: |
          set -uo pipefail
          if [ "$STATUS" = "success" ]; then ICON="🟡"; WORD="STAGING deployed"; else ICON="❌"; WORD="STAGING deploy FAILED"; fi
          SUBJECT=$(printf '%s' "${COMMIT_MSG:-manual dispatch}" | head -n1 | cut -c1-200)
          TEXT="${ICON} VeloGrip ${WORD} — ${GITHUB_SHA::7}
          ${SUBJECT}
          ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          curl -sS \
            --data-urlencode "chat_id=${TG_CHAT_ID}" \
            --data-urlencode "text=${TEXT}" \
            "https://api.telegram.org/bot${TG_BOT_TOKEN}/sendMessage" > /dev/null || true
