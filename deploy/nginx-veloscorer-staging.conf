# VeloGripScorer STAGING behind the same nginx, hosted at /veloscorer-staging.
#
# The staging stack runs from a separate clone with, in its .env:
#     BASE_PATH=/veloscorer-staging
#     HOST_PORT=3001
#     COMPOSE_PROJECT_NAME=velogripscorer_staging
# so it listens on 127.0.0.1:3001 with its own DB volume, next to prod (3000).
#
# Add this `location` block alongside the prod one in your HTTPS server { ... },
# then: sudo nginx -t && sudo systemctl reload nginx

location = /veloscorer-staging { return 301 /veloscorer-staging/; }

location /veloscorer-staging/ {
    proxy_pass http://127.0.0.1:3001/veloscorer-staging/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # Live results use Server-Sent Events: disable buffering and allow
    # long-lived connections, or the leaderboard/timing streams will stall.
    proxy_buffering off;
    proxy_cache off;
    proxy_read_timeout 1h;
    proxy_send_timeout 1h;

    client_max_body_size 110m;
}
