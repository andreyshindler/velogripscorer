# VeloGripScorer behind an existing nginx, hosted at /veloscorer.
#
# 1. Set BASE_PATH=/veloscorer in the app's .env and `docker compose up -d --build`.
# 2. Copy this `location` block INTO your existing `server { ... }` section for
#    the HTTPS host (e.g. /etc/nginx/sites-enabled/default or your vhost file).
# 3. sudo nginx -t && sudo systemctl reload nginx

location = /veloscorer { return 301 /veloscorer/; }

location /veloscorer/ {
    proxy_pass http://127.0.0.1:3000/veloscorer/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # Live results use Server-Sent Events: disable buffering and allow
    # long-lived connections, or the leaderboard/timing streams will stall.
    proxy_buffering off;
    proxy_cache off;
    proxy_read_timeout 1h;
    proxy_send_timeout 1h;

    # Entry uploads (video up to 100 MB)
    client_max_body_size 110m;
}
